name: booksy_customer_app
description: Booksy Customer App - Book beauty and wellness services
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # API & Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  json_annotation: ^4.8.1
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Navigation
  go_router: ^13.0.0

  # UI Components
  flutter_screenutil: ^5.9.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  intl: ^0.20.2
  pinput: ^5.0.0
  shamsi_date: ^1.0.1

  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  geocoding: ^2.1.1

  # Utilities
  connectivity_plus: ^5.0.2
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  permission_handler: ^11.2.0

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Functional Programming
  dartz: ^0.10.1

  # Error Tracking (Optional)
  # sentry_flutter: ^7.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  retrofit_generator: ^8.0.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1

  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  # Fonts
  fonts:
    - family: Vazir
      fonts:
        - asset: assets/fonts/vazir/Vazir.ttf
        - asset: assets/fonts/vazir/Vazir-Bold.ttf
          weight: 700
        - asset: assets/fonts/vazir/Vazir-Medium.ttf
          weight: 500
        - asset: assets/fonts/vazir/Vazir-Light.ttf
          weight: 300
        - asset: assets/fonts/vazir/Vazir-Thin.ttf
          weight: 100
