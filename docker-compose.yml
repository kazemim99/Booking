services:
  postgres:
    image: postgres:16-alpine
    environment:
      # Use consistent credentials
      - POSTGRES_USER=booksy_admin
      - POSTGRES_PASSWORD=Booksy@2024!
      - POSTGRES_DB=booksy_user_management
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "54321:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/scripts/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - booksy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booksy_admin -d booksy_user_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@booksy.com
      - PGADMIN_DEFAULT_PASSWORD=Booksy@2024!
      - PGADMIN_CONFIG_SERVER_MODE=False
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - booksy-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass Redis@2024!
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - booksy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # RabbitMQ removed: CAP runs in-process inside the monolith host.

  # ========================================
  # API SERVICES
  # ========================================

  # Modular-monolith host (replaces gateway + usermanagement-api + servicecatalog-api).
  # CAP runs in-process (EventBus__Provider=InMemory); no RabbitMQ dependency.
  booksy-api:
    build:
      context: .
      dockerfile: src/Host/Booksy.Host/Dockerfile
      # Enable BuildKit for faster builds and caching
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    container_name: booksy-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=booksy_user_management;Username=booksy_admin;Password=Booksy@2024!
      - ConnectionStrings__Redis=redis:6379,password=Redis@2024!
      - EventBus__Provider=InMemory
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - booksy-network
    restart: unless-stopped

  booksy-frontend:
    build:
      context: ./booksy-frontend
      dockerfile: Dockerfile
      # Enable BuildKit for faster builds and caching
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    container_name: booksy-frontend
    ports:
      - "8080:80"
    depends_on:
      - booksy-api
    networks:
      - booksy-network
    restart: unless-stopped

  # ========================================
  # OBSERVABILITY & MONITORING
  # ========================================

  seq:
    image: datalust/seq:latest
    container_name: booksy-seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINUSERNAME=admin
      - SEQ_FIRSTRUN_ADMINPASSWORD=Booksy@2024!!
    ports:
      - "5341:80"        # Seq UI
      - "5342:5341"      # Seq ingestion endpoint
    volumes:
      - seq_data:/data
    networks:
      - booksy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  seq_data:

networks:
  booksy-network:
    driver: bridge