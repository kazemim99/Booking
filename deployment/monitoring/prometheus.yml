# Prometheus Configuration for Booksy Platform
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'booksy-dev'
    environment: 'development'

# Alertmanager configuration (optional, can be added later)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ServiceCatalog API
  - job_name: 'servicecatalog-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:5000']
        labels:
          service: 'servicecatalog'
          context: 'ServiceCatalog'

  # UserManagement API
  - job_name: 'usermanagement-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:5001']
        labels:
          service: 'usermanagement'
          context: 'UserManagement'

  # PostgreSQL Exporter (if you add it later)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis Exporter (if you add it later)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # RabbitMQ Exporter (built-in metrics)
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
        labels:
          service: 'rabbitmq'
