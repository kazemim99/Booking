name: Deploy to Staging

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_PATH: './Booksy.sln'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/booksy

jobs:
  # Run tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booksy_admin
          POSTGRES_PASSWORD: TestPassword123!
          POSTGRES_DB: booksy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booksy_admin -d booksy_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Build solution
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

    - name: Run Unit Tests
      run: |
        dotnet test ${{ env.SOLUTION_PATH }} \
          --configuration Release \
          --no-build \
          --filter "FullyQualifiedName~UnitTests" \
          --verbosity normal

    - name: Run Integration Tests
      env:
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=booksy_test;Username=booksy_admin;Password=TestPassword123!;Include Error Detail=true"
        ConnectionStrings__Redis: "localhost:6379"
      run: |
        dotnet test ${{ env.SOLUTION_PATH }} \
          --configuration Release \
          --no-build \
          --filter "FullyQualifiedName~IntegrationTests" \
          --verbosity normal

  # Keystone end-to-end smoke test: boot the real monolith host against ephemeral
  # Postgres+Redis and exercise the core flow (provider onboard → staff → customer
  # books). This is the flow that must never regress; it gates the build/deploy.
  e2e-keystone:
    name: Keystone E2E Smoke
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booksy_admin
          POSTGRES_PASSWORD: TestPassword123!
          POSTGRES_DB: booksy_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booksy_admin -d booksy_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Start Booksy host (sandbox auth, no real SMS)
      env:
        ASPNETCORE_ENVIRONMENT: Development
        ASPNETCORE_URLS: http://localhost:5050
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=booksy_e2e;Username=booksy_admin;Password=TestPassword123!;Include Error Detail=true"
        ConnectionStrings__Redis: "localhost:6379"
        EventBus__Provider: "InMemory"
        OTP_SANDBOX_CODE: "123456"
        # Single global SMS sandbox switch: forces every provider (Rahyab + Kavenegar)
        # into sandbox/disabled mode, so no real SMS is sent and no API key is required.
        Sms__SandboxMode: "true"
      run: |
        dotnet run --project src/Host/Booksy.Host/Booksy.Host.csproj --configuration Release > host.log 2>&1 &
        echo $! > host.pid

    - name: Wait for host to become healthy
      run: |
        for i in $(seq 1 80); do
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5050/health || echo 000)
          if [ "$code" = "200" ]; then echo "Host healthy after ~$((i*3))s"; exit 0; fi
          sleep 3
        done
        echo "Host did not become healthy in time"; tail -n 200 host.log; exit 1

    - name: Run keystone booking flow
      run: BASE=http://localhost:5050 bash tests/e2e/keystone-booking-flow.sh

    - name: Dump host log on failure
      if: failure()
      run: tail -n 300 host.log || true

  # Build and push Docker images
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test, e2e-keystone]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      run: |
        echo "date=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
        echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    - name: Build and push Booksy API (monolith)
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./src/Host/Booksy.Host/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:develop
          ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:develop-${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: booksy-frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: booksy-frontend
      run: npm ci

    - name: Build frontend
      working-directory: booksy-frontend
      run: npm run build

    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./booksy-frontend
        file: ./booksy-frontend/Dockerfile
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:develop
          ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:develop-${{ steps.meta.outputs.sha_short }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to staging server
  deploy-staging:
    name: Deploy to Staging Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    environment:
      name: staging
      url: http://${{ secrets.STAGING_SERVER_HOST }}:8080

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create deployment package
      run: |
        mkdir -p deployment-package
        cp docker-compose.staging.yml deployment-package/
        cp deployment/.env.staging.example deployment-package/.env.staging
        tar -czf deployment-staging.tar.gz deployment-package/

    - name: Copy deployment files to staging server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.STAGING_SERVER_HOST }}
        username: ${{ secrets.STAGING_SERVER_USER }}
        key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
        port: 22
        source: "deployment-staging.tar.gz"
        target: ${{ secrets.STAGING_DEPLOY_PATH }}

    - name: Deploy to staging server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_SERVER_HOST }}
        username: ${{ secrets.STAGING_SERVER_USER }}
        key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
        port: 22
        script: |
          set -e

          cd ${{ secrets.STAGING_DEPLOY_PATH }}
          tar -xzf deployment-staging.tar.gz
          cd deployment-package

          # Login to GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

          # Set staging tag
          export STAGING_TAG=develop

          # Pull latest images
          docker-compose -f docker-compose.staging.yml pull

          # Stop old containers
          docker-compose -f docker-compose.staging.yml down

          # Start new containers
          docker-compose -f docker-compose.staging.yml up -d

          # Wait for services
          sleep 15

          # Check status
          docker-compose -f docker-compose.staging.yml ps

          # Clean up old images
          docker image prune -af --filter "until=48h"

          echo "Staging deployment completed!"

    - name: Health check
      run: |
        sleep 30
        response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.STAGING_SERVER_HOST }}:8080/ || echo "000")
        if [ "$response" != "200" ]; then
          echo "Health check failed with status: $response"
          exit 1
        fi
        echo "Staging health check passed!"

  # Notify deployment status
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: always() && github.event_name == 'push'

    steps:
    - name: Staging Deployment Success
      if: needs.deploy-staging.result == 'success'
      run: |
        echo "Deployment to staging completed successfully!"
        echo "Staging URL: http://${{ secrets.STAGING_SERVER_HOST }}:8080"
        echo "Version: ${{ github.sha }}"

    - name: Staging Deployment Failed
      if: needs.deploy-staging.result == 'failure'
      run: |
        echo "Staging deployment failed!"
        exit 1
