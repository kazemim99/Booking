name: Frontend E2E (Playwright)

# Advisory UI smoke — runs the real Vue app against an ephemeral stack.
# Not a deploy gate (the API keystone job already gates deploys); runs on PRs
# and on demand. Promote to a deploy gate later if desired.
on:
  pull_request:
    branches: [ "master", "develop" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_PATH: './Booksy.sln'

jobs:
  playwright:
    name: Playwright keystone (UI)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: booksy_admin
          POSTGRES_PASSWORD: TestPassword123!
          POSTGRES_DB: booksy_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U booksy_admin -d booksy_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: booksy-frontend/package-lock.json

    - name: Restore .NET
      run: dotnet restore ${{ env.SOLUTION_PATH }}

    - name: Start Booksy host (sandbox auth, no real SMS)
      env:
        ASPNETCORE_ENVIRONMENT: Development
        ASPNETCORE_URLS: http://localhost:5050
        ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=booksy_e2e;Username=booksy_admin;Password=TestPassword123!;Include Error Detail=true"
        ConnectionStrings__Redis: "localhost:6379"
        EventBus__Provider: "InMemory"
        OTP_SANDBOX_CODE: "123456"
        Sms__SandboxMode: "true"
      run: |
        dotnet run --project src/Host/Booksy.Host/Booksy.Host.csproj --configuration Release > host.log 2>&1 &
        echo $! > host.pid

    - name: Wait for host to become healthy
      run: |
        for i in $(seq 1 80); do
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:5050/health || echo 000)
          if [ "$code" = "200" ]; then echo "Host healthy after ~$((i*3))s"; exit 0; fi
          sleep 3
        done
        echo "Host did not become healthy"; tail -n 200 host.log; exit 1

    - name: Install frontend deps
      working-directory: booksy-frontend
      run: npm ci

    - name: Install Playwright browser
      working-directory: booksy-frontend
      run: npx playwright install --with-deps chromium

    - name: Run Playwright keystone suite
      working-directory: booksy-frontend
      env:
        CI: 'true'
      run: npm run e2e:pw

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: |
          booksy-frontend/playwright-report
          booksy-frontend/test-results
        retention-days: 7
        if-no-files-found: ignore

    - name: Dump host log on failure
      if: failure()
      run: tail -n 300 host.log || true
