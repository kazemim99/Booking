version: '3.8'

services:
  booksy-admin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booksy-admin
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - booksy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  booksy-network:
    external: true
